<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="openhands-chat-app - by Antono4">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenHands Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-header .avatar {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .chat-header .info h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .chat-header .info p {
            font-size: 12px;
            opacity: 0.9;
        }

        .api-key-button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .api-key-button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
        }

        .api-key-button svg {
            width: 18px;
            height: 18px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #f1f0f0;
            color: #333;
            border-bottom-left-radius: 5px;
        }

        .message.error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 15px 20px;
            background: #f1f0f0;
            border-radius: 15px;
            align-self: flex-start;
            max-width: 80%;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .chat-input-container {
            padding: 20px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            resize: none;
            font-family: inherit;
            max-height: 120px;
            min-height: 50px;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .send-button {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .send-button svg {
            width: 20px;
            height: 20px;
        }

        .welcome-message {
            text-align: center;
            color: #666;
            padding: 40px;
        }

        .welcome-message h2 {
            color: #333;
            margin-bottom: 10px;
        }

        /* Video Container */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 560px;
            margin: 10px 0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .video-container iframe,
        .video-container video {
            width: 100%;
            aspect-ratio: 16 / 9;
            display: block;
        }

        /* API Key Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transform: scale(0.9);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
        }

        .modal h2 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        .modal p a {
            color: #667eea;
            text-decoration: none;
        }

        .modal p a:hover {
            text-decoration: underline;
        }

        .modal-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 15px;
            font-family: monospace;
        }

        .modal-input:focus {
            border-color: #667eea;
            outline: none;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .modal-btn.cancel {
            background: #f1f0f0;
            color: #666;
        }

        .modal-btn.cancel:hover {
            background: #e0e0e0;
        }

        .modal-btn.save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .modal-btn.save:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .status {
            font-size: 11px;
            color: #666;
            margin-top: 10px;
        }

        .api-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 10px;
        }

        .api-status-badge.connected {
            background: #d4edda;
            color: #155724;
        }

        .api-status-badge.not-set {
            background: #fff3cd;
            color: #856404;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- API Key Modal -->
    <div class="modal-overlay" id="apiKeyModal">
        <div class="modal">
            <h2>🔑 API Key</h2>
            <p>
                Masukkan OpenHands API Key Anda untuk memulai chat.<br>
                Dapatkan API Key di <a href="https://app.all-hands.dev/settings/user" target="_blank">sini</a>
            </p>
            <input 
                type="password" 
                class="modal-input" 
                id="apiKeyInput" 
                placeholder="Masukkan API Key Anda..."
            >
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeModal()">Batal</button>
                <button class="modal-btn save" onclick="saveApiKey()">Simpan</button>
            </div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="avatar">🤖</div>
                <div class="info">
                    <h1>OpenHands AI Chat</h1>
                    <p id="status">
                        Online
                        <span class="api-status-badge not-set" id="apiStatusBadge">⚠️ Belum diatur</span>
                    </p>
                </div>
            </div>
            <button class="api-key-button" onclick="openModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                </svg>
                <span id="apiKeyButtonText">Set API Key</span>
            </button>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome-message" id="welcomeMessage">
                <h2>👋 Selamat Datang!</h2>
                <p>Tanyakan apa saja atau minta bantuan saya.</p>
            </div>
        </div>

        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <textarea 
                    class="chat-input" 
                    id="chatInput" 
                    placeholder="Ketik pesan Anda..."
                    rows="1"
                ></textarea>
                <button class="send-button" id="sendButton" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
            <div class="status" id="connectionStatus">Siap terhubung ke OpenHands API</div>
        </div>
    </div>

    <script>
        // Configuration
        const API_BASE_URL = 'https://app.all-hands.dev/api/v1';
        
        // State
        let conversationId = null;
        let isLoading = false;
        let ws = null;
        let wsReconnectAttempts = 0;
        let messageBuffer = [];
        let lastProcessedEventId = null;

        // DOM Elements
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const statusEl = document.getElementById('status');
        const connectionStatusEl = document.getElementById('connectionStatus');
        const apiKeyModal = document.getElementById('apiKeyModal');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const apiStatusBadge = document.getElementById('apiStatusBadge');
        const apiKeyButtonText = document.getElementById('apiKeyButtonText');
        const welcomeMessage = document.getElementById('welcomeMessage');

        // Modal functions
        function openModal() {
            apiKeyModal.classList.add('active');
            apiKeyInput.value = localStorage.getItem('session_api_key') || '';
            apiKeyInput.focus();
        }

        function closeModal() {
            apiKeyModal.classList.remove('active');
        }

        function saveApiKey() {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('session_api_key', key);
                updateApiStatus(true);
                closeModal();
                addMessage('✅ API Key berhasil disimpan!', 'success');
                
                // Remove welcome message if exists
                if (welcomeMessage) {
                    welcomeMessage.remove();
                }
                
                // Add greeting
                addMessage('👋 Halo! Saya adalah asisten AI OpenHands. Ada yang bisa saya bantu hari ini?', 'assistant');
            }
        }

        function updateApiStatus(hasKey) {
            if (hasKey) {
                apiStatusBadge.className = 'api-status-badge connected';
                apiStatusBadge.textContent = '✅ Terhubung';
                apiKeyButtonText.textContent = 'Update API Key';
                connectionStatusEl.textContent = 'API Key tersimpan • Siap digunakan';
            } else {
                apiStatusBadge.className = 'api-status-badge not-set';
                apiStatusBadge.textContent = '⚠️ Belum diatur';
                apiKeyButtonText.textContent = 'Set API Key';
                connectionStatusEl.textContent = 'API Key belum diatur';
            }
        }

        // WebSocket connection for real-time events
        function connectWebSocket(agentServerUrl, sessionApiKey) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                return ws;
            }

            try {
                // Convert HTTP URL to WebSocket URL
                const wsUrl = agentServerUrl.replace('http://', 'ws://').replace('https://', 'wss://');
                ws = new WebSocket(`${wsUrl}/api/conversations/${conversationId}/ws`);

                ws.onopen = () => {
                    console.log('WebSocket connected');
                    wsReconnectAttempts = 0;
                    // Send auth
                    ws.send(JSON.stringify({ type: 'auth', api_key: sessionApiKey }));
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleWebSocketMessage(data);
                    } catch (e) {
                        console.error('WebSocket parse error:', e);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket error:', error);
                };

                ws.onclose = () => {
                    console.log('WebSocket closed');
                    // Reconnect if not intentional close
                    if (wsReconnectAttempts < 5) {
                        wsReconnectAttempts++;
                        setTimeout(() => connectWebSocket(agentServerUrl, sessionApiKey), 1000);
                    }
                };

                return ws;
            } catch (error) {
                console.error('WebSocket connection error:', error);
                return null;
            }
        }

        // Handle WebSocket messages
        function handleWebSocketMessage(data) {
            if (data.type === 'message' && data.source === 'assistant') {
                hideTyping();
                const content = data.message?.content?.[0]?.text || data.message?.text || '';
                if (content) {
                    addMessage(content);
                }
            } else if (data.type === 'status') {
                if (data.status === 'running') {
                    showTyping();
                } else if (data.status === 'finished' || data.status === 'stopped') {
                    hideTyping();
                }
            }
        }

        // Close modal on outside click
        apiKeyModal.addEventListener('click', function(e) {
            if (e.target === apiKeyModal) {
                closeModal();
            }
        });

        // Save on Enter in modal
        apiKeyInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                saveApiKey();
            }
        });

        // Get API key from localStorage
        function getApiKey() {
            return localStorage.getItem('session_api_key');
        }

        // Auto-resize textarea
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Send on Enter (Shift+Enter for new line)
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Add message to chat
        function addMessage(content, type = 'assistant') {
            // Remove welcome message when first real message is added
            if (welcomeMessage && type !== 'success') {
                welcomeMessage.remove();
            }
            
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.innerHTML = processContent(content).replace(/\n/g, '<br>');
            chatMessages.appendChild(message);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return message;
        }

        // Process content to embed videos
        function processContent(content) {
            // YouTube - auto play
            const youtubeRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/g;
            content = content.replace(youtubeRegex, (match, videoId) => {
                return `<div class="video-container">
                    <iframe 
                        src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>`;
            });

            // Vimeo - auto play
            const vimeoRegex = /(?:https?:\/\/)?(?:www\.)?vimeo\.com\/(\d+)/g;
            content = content.replace(vimeoRegex, (match, videoId) => {
                return `<div class="video-container">
                    <iframe 
                        src="https://player.vimeo.com/video/${videoId}?autoplay=1" 
                        frameborder="0" 
                        allow="autoplay; fullscreen; picture-in-picture" 
                        allowfullscreen>
                    </iframe>
                </div>`;
            });

            // Direct video files (mp4, webm, etc.)
            const videoFileRegex = /(?:https?:\/\/[^\s<>"']+\.(?:mp4|webm|ogg|mov)(?:\?[^\s<>"']*)?)/gi;
            content = content.replace(videoFileRegex, (url) => {
                return `<div class="video-container">
                    <video controls autoplay>
                        <source src="${url}" type="video/${url.split('.').pop().split('?')[0]}">
                        Your browser does not support the video tag.
                    </video>
                </div>`;
            });

            return content;
        }

        // Show typing indicator
        function showTyping() {
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.id = 'typingIndicator';
            typing.innerHTML = '<span></span><span></span><span></span>';
            chatMessages.appendChild(typing);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Hide typing indicator
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        // Poll for conversation ready status
        async function pollConversationReady(startTaskId) {
            const apiKey = getApiKey();
            const maxAttempts = 60;
            let attempts = 0;

            while (attempts < maxAttempts) {
                try {
                    const response = await fetch(`${API_BASE_URL}/app-conversations/start-tasks?ids=${startTaskId}`, {
                        headers: {
                            'Authorization': `Bearer ${apiKey}`
                        }
                    });

                    const data = await response.json();
                    if (data[0] && data[0].status === 'READY') {
                        return data[0];
                    }
                } catch (error) {
                    console.error('Poll error:', error);
                }

                await new Promise(resolve => setTimeout(resolve, 1000));
                attempts++;
            }

            return null;
        }

        // Send message to OpenHands
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || isLoading) return;

            const apiKey = getApiKey();
            if (!apiKey) {
                addMessage('⚠️ API Key belum diatur. Klik tombol "Set API Key" di pojok kanan atas untuk memasukkan API Key Anda.', 'error');
                openModal();
                return;
            }

            isLoading = true;
            sendButton.disabled = true;
            statusEl.innerHTML = 'Online <span class="api-status-badge connected">⏳ Mengirim...</span>';

            // Add user message
            addMessage(message, 'user');
            chatInput.value = '';
            chatInput.style.height = 'auto';

            // Show typing indicator
            showTyping();

            try {
                // Create new conversation
                statusEl.innerHTML = 'Online <span class="api-status-badge connected">⏳ Membuat percakapan...</span>';
                
                const createResponse = await fetch(`${API_BASE_URL}/app-conversations`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: '💬 Chat Web App',
                        initial_message: {
                            role: 'user',
                            content: [{ type: 'text', text: message }],
                            run: true
                        },
                        agent_type: 'default'
                    })
                });

                if (!createResponse.ok) {
                    throw new Error(`HTTP ${createResponse.status}: Gagal membuat percakapan`);
                }

                const createData = await createResponse.json();
                const startTaskId = createData.id;
                
                // Poll for ready status
                statusEl.innerHTML = 'Online <span class="api-status-badge connected">⏳ Menunggu agent siap...</span>';
                const readyData = await pollConversationReady(startTaskId);
                
                if (!readyData || !readyData.app_conversation_id) {
                    throw new Error('Tidak dapat membuat percakapan. Silakan coba lagi.');
                }

                conversationId = readyData.app_conversation_id;
                const agentServerUrl = readyData.agent_server_url;

                // Poll for response
                statusEl.innerHTML = 'Online <span class="api-status-badge connected">⏳ Agent sedang berpikir...</span>';
                await pollForResponse(conversationId, agentServerUrl, readyData.session_api_key);

            } catch (error) {
                console.error('Send message error:', error);
                hideTyping();
                addMessage(`❌ Error: ${error.message}`, 'error');
            } finally {
                isLoading = false;
                sendButton.disabled = false;
                statusEl.innerHTML = `Online <span class="api-status-badge connected">✅ Terhubung</span>`;
            }
        }

        // Ultra-fast polling for response (fallback when WebSocket not available)
        async function pollForResponse(conversationId, agentServerUrl, sessionApiKey, maxAttempts = 300) {
            let lastEventId = null;
            let attempts = 0;
            let consecutiveEmpty = 0;
            let wsFallback = false;

            // Try WebSocket first
            const wsConnected = connectWebSocket(agentServerUrl, sessionApiKey);
            if (wsConnected) {
                // Wait a bit for WebSocket to establish
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            while (attempts < maxAttempts) {
                try {
                    // Use SSE endpoint or fast polling
                    const url = lastEventId 
                        ? `${agentServerUrl}/api/conversations/${conversationId}/events?since_event_id=${lastEventId}&limit=100`
                        : `${agentServerUrl}/api/conversations/${conversationId}/events?limit=100`;
                    
                    const response = await fetch(url, {
                        headers: {
                            'X-Session-API-Key': sessionApiKey
                        }
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    const events = data.items || data || [];
                    
                    if (events.length > 0) {
                        consecutiveEmpty = 0;
                        
                        // Update last event ID
                        lastEventId = events[events.length - 1].id;
                        
                        // Process events in order
                        for (const event of events) {
                            if (event.source === 'assistant' && event.kind === 'MessageEvent') {
                                const content = extractMessageContent(event);
                                if (content) {
                                    hideTyping();
                                    addMessage(content);
                                }
                            }
                        }
                        
                        // Check if agent is done
                        const statusEvent = events.find(e => e.kind === 'ConversationStatusEvent');
                        if (statusEvent) {
                            if (statusEvent.status === 'finished' || statusEvent.status === 'stopped' || statusEvent.status === 'error') {
                                if (ws) { ws.close(); ws = null; }
                                return;
                            }
                        }
                        
                        // Ultra-fast polling: 100ms intervals (10x faster than before)
                        await new Promise(resolve => setTimeout(resolve, 100));
                    } else {
                        consecutiveEmpty++;
                        // Slightly back off if no new events, but still keep it fast
                        const delay = Math.min(300, 100 + consecutiveEmpty * 20);
                        await new Promise(resolve => setTimeout(resolve, delay));
                    }
                } catch (error) {
                    console.error('Poll response error:', error);
                    await new Promise(resolve => setTimeout(resolve, 500));
                }

                attempts++;
            }

            if (ws) { ws.close(); ws = null; }
            hideTyping();
            addMessage('⏱️ Agent sedang memproses respons yang panjang. Silakan tunggu...', 'assistant');
        }

        // Extract message content from event
        function extractMessageContent(event) {
            if (!event.message) return null;
            
            const message = event.message;
            if (typeof message === 'string') return message;
            
            if (message.content) {
                if (Array.isArray(message.content)) {
                    return message.content.map(c => c.text || c.content || '').join('');
                }
                return message.content.text || message.content;
            }
            
            return null;
        }

        // Initialize
        function init() {
            const hasKey = !!getApiKey();
            updateApiStatus(hasKey);
            
            if (hasKey) {
                addMessage('👋 Halo! Saya adalah asisten AI OpenHands. Ada yang bisa saya bantu hari ini?', 'assistant');
            } else {
                addMessage('👋 Halo! Saya adalah asisten AI OpenHands.<br><br>⚠️ Untuk memulai, silakan klik tombol <strong>"Set API Key"</strong> di pojok kanan atas.', 'assistant');
            }
        }

        init();
    </script>
</body>
